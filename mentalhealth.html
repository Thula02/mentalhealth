
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mental Health Score</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      color: #e0e0e0;
    }

    .container {
      max-width: 700px;
      width: 100%;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      text-align: center;
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 30px;
    }

    /* Progress bar */
    .progress-bar-container {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      height: 8px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6c63ff, #48c6ef);
      border-radius: 12px;
      transition: width 0.4s ease;
    }

    /* Question card */
    .question-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 32px 28px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .question-number {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #6c63ff;
      margin-bottom: 12px;
    }

    .question-text {
      font-size: 1.15rem;
      line-height: 1.6;
      margin-bottom: 24px;
      color: #f0f0f0;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 14px 18px;
      color: #ddd;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: left;
    }

    .option-btn:hover {
      background: rgba(108, 99, 255, 0.2);
      border-color: #6c63ff;
      transform: translateX(4px);
    }

    .option-btn.selected {
      background: rgba(108, 99, 255, 0.3);
      border-color: #6c63ff;
      color: #fff;
    }

    /* Navigation */
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .nav-btn {
      padding: 12px 28px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.25s ease;
      font-weight: 600;
    }

    .nav-btn.prev {
      background: rgba(255,255,255,0.08);
      color: #ccc;
    }

    .nav-btn.prev:hover { background: rgba(255,255,255,0.15); }

    .nav-btn.next {
      background: linear-gradient(135deg, #6c63ff, #48c6ef);
      color: #fff;
    }

    .nav-btn.next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,99,255,0.4); }

    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* Results */
    .results-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.5s ease;
    }

    .results-title {
      font-size: 1.6rem;
      margin-bottom: 30px;
      color: #fff;
    }

    /* Meter */
    .meter-container {
      position: relative;
      width: 240px;
      height: 130px;
      margin: 0 auto 30px;
    }

    .meter-svg {
      width: 100%;
      height: 100%;
    }

    .meter-bg {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 18;
      stroke-linecap: round;
    }

    .meter-fill {
      fill: none;
      stroke-width: 18;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.5s ease, stroke 0.5s ease;
    }

    .meter-score {
      font-size: 2.8rem;
      font-weight: 700;
      fill: #fff;
    }

    .meter-label {
      font-size: 0.85rem;
      fill: #aaa;
    }

    /* Score breakdown */
    .breakdown {
      text-align: left;
      margin-top: 30px;
    }

    .breakdown-title {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    .breakdown-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .breakdown-item .label {
      font-size: 0.9rem;
      color: #ccc;
    }

    .breakdown-item .bar-wrapper {
      width: 120px;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
      margin: 0 12px;
      flex-shrink: 0;
    }

    .breakdown-item .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1s ease;
    }

    .breakdown-item .score-val {
      font-size: 0.85rem;
      color: #aaa;
      min-width: 28px;
      text-align: right;
    }

    .result-message {
      margin-top: 28px;
      padding: 20px;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .restart-btn {
      margin-top: 28px;
      padding: 14px 36px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6c63ff, #48c6ef);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(108,99,255,0.4);
    }

    .hidden { display: none; }

    @media (max-width: 500px) {
      h1 { font-size: 1.5rem; }
      .question-card { padding: 24px 20px; }
      .results-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Mental Health Check-In</h1>
  <p class="subtitle">Answer honestly — there are no right or wrong answers</p>

  <div class="progress-bar-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="quizSection">
    <div class="question-card" id="questionCard">
      <div class="question-number" id="questionNumber"></div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
    </div>

    <div class="nav-buttons">
      <button class="nav-btn prev" id="prevBtn" onclick="navigate(-1)">← Back</button>
      <button class="nav-btn next" id="nextBtn" onclick="navigate(1)" disabled>Next →</button>
    </div>
  </div>

  <div id="resultsSection" class="hidden"></div>
</div>

<script>
const questions = [
  {
    dimension: "Vitality",
    text: "How often have you woken up feeling fresh and rested?",
    options: [
      { label: "Almost never", score: 0 },
      { label: "Rarely", score: 0.25 },
      { label: "Sometimes", score: 0.5 },
      { label: "Often", score: 0.75 },
      { label: "Almost every day", score: 1 }
    ]
  },
  {
    dimension: "Interest",
    text: "To what extent do you feel your daily life is filled with things that interest you?",
    options: [
      { label: "Not at all", score: 0 },
      { label: "A little", score: 0.25 },
      { label: "Moderately", score: 0.5 },
      { label: "Quite a bit", score: 0.75 },
      { label: "Completely", score: 1 }
    ]
  },
  {
    dimension: "Optimism",
    text: "How often have you been feeling optimistic about the future?",
    options: [
      { label: "Almost never", score: 0 },
      { label: "Rarely", score: 0.25 },
      { label: "Sometimes", score: 0.5 },
      { label: "Often", score: 0.75 },
      { label: "Most of the time", score: 1 }
    ]
  },
  {
    dimension: "Agency",
    text: "Do you feel you have been able to make up your own mind about things (autonomy)?",
    options: [
      { label: "Not at all", score: 0 },
      { label: "Slightly", score: 0.25 },
      { label: "Somewhat", score: 0.5 },
      { label: "Mostly", score: 0.75 },
      { label: "Completely", score: 1 }
    ]
  },
  {
    dimension: "Competence",
    text: "How often have you felt you are dealing with your problems well?",
    options: [
      { label: "Almost never", score: 0 },
      { label: "Rarely", score: 0.25 },
      { label: "Sometimes", score: 0.5 },
      { label: "Often", score: 0.75 },
      { label: "Almost always", score: 1 }
    ]
  },
  {
    dimension: "Connection",
    text: "How often have you been feeling close to other people?",
    options: [
      { label: "Almost never", score: 0 },
      { label: "Rarely", score: 0.25 },
      { label: "Sometimes", score: 0.5 },
      { label: "Often", score: 0.75 },
      { label: "Almost always", score: 1 }
    ]
  },
  {
    dimension: "Self-Acceptance",
    text: "To what degree have you been feeling good about yourself?",
    options: [
      { label: "Not at all", score: 0 },
      { label: "Slightly", score: 0.25 },
      { label: "Moderately", score: 0.5 },
      { label: "Quite a bit", score: 0.75 },
      { label: "Very much", score: 1 }
    ]
  },
  {
    dimension: "Resilience",
    text: "When things go wrong in your life, how long does it typically take you to return to normal?",
    options: [
      { label: "A very long time or I don't recover", score: 0 },
      { label: "Quite a while", score: 0.25 },
      { label: "A moderate amount of time", score: 0.5 },
      { label: "Fairly quickly", score: 0.75 },
      { label: "I bounce back almost immediately", score: 1 }
    ]
  },
  {
    dimension: "Meaning",
    text: "Do you feel that the things you do in your life are worthwhile?",
    options: [
      { label: "Not at all", score: 0 },
      { label: "A little", score: 0.25 },
      { label: "Somewhat", score: 0.5 },
      { label: "Mostly", score: 0.75 },
      { label: "Definitely", score: 1 }
    ]
  },
  {
    dimension: "Emotional Balance",
    text: "How often have you felt calm and relaxed versus anxious or \"on edge\"?",
    options: [
      { label: "Almost always anxious", score: 0 },
      { label: "Mostly anxious", score: 0.25 },
      { label: "About equal", score: 0.5 },
      { label: "Mostly calm", score: 0.75 },
      { label: "Almost always calm and relaxed", score: 1 }
    ]
  }
];

let current = 0;
let answers = new Array(questions.length).fill(null);

function renderQuestion() {
  const q = questions[current];
  document.getElementById("questionNumber").textContent = `Question ${current + 1} of ${questions.length}  •  ${q.dimension}`;
  document.getElementById("questionText").textContent = q.text;

  const container = document.getElementById("optionsContainer");
  container.innerHTML = "";

  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn" + (answers[current] === i ? " selected" : "");
    btn.textContent = opt.label;
    btn.onclick = () => selectOption(i);
    container.appendChild(btn);
  });

  document.getElementById("prevBtn").style.visibility = current === 0 ? "hidden" : "visible";
  document.getElementById("nextBtn").disabled = answers[current] === null;
  document.getElementById("nextBtn").textContent = current === questions.length - 1 ? "See Results" : "Next →";
  document.getElementById("progressBar").style.width = ((current + 1) / questions.length * 100) + "%";

  // Re-trigger animation
  const card = document.getElementById("questionCard");
  card.style.animation = "none";
  card.offsetHeight;
  card.style.animation = "";
}

function selectOption(index) {
  answers[current] = index;
  document.querySelectorAll(".option-btn").forEach((btn, i) => {
    btn.classList.toggle("selected", i === index);
  });
  document.getElementById("nextBtn").disabled = false;
}

function navigate(dir) {
  if (dir === 1 && current === questions.length - 1) {
    showResults();
    return;
  }
  current += dir;
  renderQuestion();
}

function getColor(score) {
  if (score > 7) return "#22c55e";       // green
  if (score > 4) return "#f59e0b";       // orange
  return "#ef4444";                       // red
}

function getColorForBar(fraction) {
  const val = fraction * 10;
  if (val > 7) return "#22c55e";
  if (val > 4) return "#f59e0b";
  return "#ef4444";
}

function showResults() {
  document.getElementById("quizSection").classList.add("hidden");
  document.getElementById("progressBar").style.width = "100%";

  const totalScore = answers.reduce((sum, ans, i) => sum + questions[i].options[ans].score, 0);
  const scoreOutOf10 = Math.round(totalScore * 10) / 10;
  const color = getColor(scoreOutOf10);

  // Arc meter math
  const cx = 120, cy = 110, r = 85;
  const startAngle = Math.PI;
  const endAngle = 0;
  const arcLength = Math.PI * r;
  const fillFraction = scoreOutOf10 / 10;
  const dashOffset = arcLength * (1 - fillFraction);

  const x1 = cx + r * Math.cos(startAngle);
  const y1 = cy - r * Math.sin(startAngle);
  const x2 = cx + r * Math.cos(endAngle);
  const y2 = cy - r * Math.sin(endAngle);

  let message = "", msgBg = "";
  if (scoreOutOf10 > 7) {
    message = "You're doing great! Your mental well-being appears strong across most areas. Keep up the healthy habits and self-care routines that are working for you.";
    msgBg = "rgba(34,197,94,0.12)";
  } else if (scoreOutOf10 > 4) {
    message = "You're in a moderate range. Some areas of your well-being could use attention. Consider small, positive changes in the dimensions where you scored lower.";
    msgBg = "rgba(245,158,11,0.12)";
  } else {
    message = "Your score suggests you may be going through a difficult time. Please consider reaching out to a mental health professional or a trusted person in your life for support.";
    msgBg = "rgba(239,68,68,0.12)";
  }

  // Build breakdown rows
  let breakdownHTML = "";
  questions.forEach((q, i) => {
    const s = questions[i].options[answers[i]].score;
    const barColor = getColorForBar(s);
    breakdownHTML += `
      <div class="breakdown-item">
        <span class="label">${q.dimension}</span>
        <div class="bar-wrapper">
          <div class="bar-fill" style="width:${s * 100}%;background:${barColor}"></div>
        </div>
        <span class="score-val">${(s * 10).toFixed(0)}/10</span>
      </div>`;
  });

  document.getElementById("resultsSection").innerHTML = `
    <div class="results-card">
      <div class="results-title">Your Mental Health Score</div>

      <div class="meter-container">
        <svg class="meter-svg" viewBox="0 0 240 130">
          <path class="meter-bg"
            d="M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}" />
          <path class="meter-fill" id="meterFill"
            d="M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}"
            stroke="${color}"
            stroke-dasharray="${arcLength}"
            stroke-dashoffset="${arcLength}" />
          <text class="meter-score" x="${cx}" y="${cy - 5}" text-anchor="middle" id="meterText">0</text>
          <text class="meter-label" x="${cx}" y="${cy + 18}" text-anchor="middle">out of 10</text>
        </svg>
      </div>

      <div class="result-message" style="background:${msgBg};border:1px solid ${color}33;color:#e0e0e0">
        ${message}
      </div>

      <div class="breakdown">
        <div class="breakdown-title">Dimension Breakdown</div>
        ${breakdownHTML}
      </div>

      <button class="restart-btn" onclick="restart()">Take Again</button>
    </div>`;

  document.getElementById("resultsSection").classList.remove("hidden");

  // Animate meter
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.getElementById("meterFill").style.strokeDashoffset = dashOffset;
      animateScore(scoreOutOf10);
    }, 100);
  });
}

function animateScore(target) {
  const el = document.getElementById("meterText");
  const duration = 1500;
  const start = performance.now();

  function tick(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = (eased * target).toFixed(1);
    el.textContent = current;
    if (progress < 1) requestAnimationFrame(tick);
    else el.textContent = target.toFixed(1);
  }
  requestAnimationFrame(tick);
}

function restart() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  document.getElementById("resultsSection").classList.add("hidden");
  document.getElementById("quizSection").classList.remove("hidden");
  renderQuestion();
}

renderQuestion();
</script>

</body>
</html>
